<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniSight AI | Mohamed Shlata</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-content.hidden { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 h-screen w-64 glass-card border-r border-white/10 z-50 p-6 hidden md:block">
        <div class="mb-10 text-center">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                OmniSight AI
            </h1>
            <p class="text-[10px] text-slate-500 mt-1 uppercase tracking-widest">Analytics Suite v3.0</p>
        </div>

        <nav class="space-y-4">
            <button onclick="switchTab('dashboard')" class="w-full flex items-center space-x-3 p-3 rounded-xl hover:bg-cyan-500/10 text-slate-300 hover:text-cyan-400 transition">
                <span>📊</span><span>Dashboard</span>
            </button>
            <button onclick="switchTab('analysis')" class="w-full flex items-center space-x-3 p-3 rounded-xl hover:bg-cyan-500/10 text-slate-300 hover:text-cyan-400 transition">
                <span>🔍</span><span>Data Inspector</span>
            </button>
            <button onclick="switchTab('reports')" class="w-full flex items-center space-x-3 p-3 rounded-xl hover:bg-cyan-500/10 text-slate-300 hover:text-cyan-400 transition">
                <span>📜</span><span>Strategic Reports</span>
            </button>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="md:ml-64 p-8">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 id="mainTitle" class="text-3xl font-bold text-white tracking-tight">Overview</h2>
                <p class="text-slate-400 mt-1">Professional Portfolio of Mohamed Shlata</p>
            </div>

            <div class="flex items-center space-x-4">
                <label for="fileInput" class="cursor-pointer bg-cyan-600 hover:bg-cyan-500 text-white px-8 py-3 rounded-full font-bold shadow-lg shadow-cyan-900/20 transition-all transform hover:scale-105 active:scale-95">
                    <span>📁 Import Excel Data</span>
                    <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls, .csv">
                </label>
            </div>
        </header>

        <!-- Dynamic Content Sections -->
        <section id="tab-dashboard" class="tab-content">
            <div class="text-center py-32 border-2 border-dashed border-white/5 rounded-[40px]">
                <div class="text-6xl mb-4 opacity-20">📊</div>
                <h3 class="text-slate-400 text-xl font-light italic">Waiting for data input to generate insights...</h3>
            </div>
        </section>

        <section id="tab-analysis" class="tab-content hidden"></section>
        <section id="tab-reports" class="tab-content hidden"></section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
